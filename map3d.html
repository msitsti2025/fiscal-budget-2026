<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 정부 예산 3D 지도</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Noto Sans KR',sans-serif;background:#0d1117;color:#e6edf3;overflow:hidden;height:100vh;}
        #canvas-container{width:100vw;height:100vh;position:relative;}
        canvas{display:block;}

        /* HEADER */
        #header{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(13,17,23,.92);border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;backdrop-filter:blur(8px);}
        #header .logo{display:flex;align-items:center;gap:10px;}
        #header .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#1d4ed8,#059669);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
        #header .logo-text{font-size:14px;font-weight:700;color:#e6edf3;}
        #header .logo-sub{font-size:10px;color:#8b949e;margin-top:1px;}
        #header .hstats{display:flex;gap:20px;align-items:center;}
        #header .hstat-val{font-size:15px;font-weight:700;color:#58a6ff;}
        #header .hstat-label{font-size:10px;color:#8b949e;}
        .back-btn{padding:6px 14px;background:#21262d;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:12px;cursor:pointer;text-decoration:none;font-family:inherit;transition:all .2s;}
        .back-btn:hover{background:#30363d;border-color:#8b949e;}

        /* LEGEND */
        #legend{position:fixed;left:16px;top:68px;background:rgba(13,17,23,.9);border:1px solid #30363d;border-radius:12px;padding:14px;z-index:100;backdrop-filter:blur(8px);max-height:calc(100vh - 80px);overflow-y:auto;min-width:200px;}
        #legend h3{font-size:11px;font-weight:700;color:#8b949e;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
        .legend-item{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;transition:opacity .2s;}
        .legend-item:hover{opacity:.8;}
        .legend-item.hidden{opacity:.3;}
        .legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
        .legend-name{font-size:11px;color:#c9d1d9;white-space:nowrap;}
        .legend-count{font-size:10px;color:#8b949e;margin-left:auto;}

        /* CONTROLS */
        #controls{position:fixed;right:16px;top:68px;background:rgba(13,17,23,.9);border:1px solid #30363d;border-radius:12px;padding:14px;z-index:100;backdrop-filter:blur(8px);width:220px;}
        #controls h3{font-size:11px;font-weight:700;color:#8b949e;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
        .ctrl-row{display:flex;gap:6px;margin-bottom:8px;}
        .ctrl-btn{flex:1;padding:6px 8px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s;text-align:center;}
        .ctrl-btn:hover{background:#30363d;}
        .ctrl-btn.active{background:#1d4ed8;border-color:#3b82f6;color:#fff;}
        .scale-box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px;margin-top:8px;}
        .scale-title{font-size:10px;color:#8b949e;margin-bottom:6px;}
        .scale-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
        .scale-block{background:#2563eb;border-radius:2px;opacity:.8;}
        .scale-label{font-size:10px;color:#8b949e;}

        /* TOOLTIP */
        #tooltip{position:fixed;background:rgba(13,17,23,.97);border:1px solid #30363d;border-radius:10px;padding:14px;z-index:200;pointer-events:none;display:none;max-width:280px;backdrop-filter:blur(8px);}
        #tooltip .tt-name{font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:6px;line-height:1.3;}
        #tooltip .tt-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#8b949e;padding:2px 0;}
        #tooltip .tt-val{color:#58a6ff;font-weight:600;}
        #tooltip .tt-budget{font-size:16px;font-weight:700;color:#3fb950;margin:6px 0 2px;}

        /* INFO PANEL */
        #info-panel{position:fixed;right:16px;bottom:16px;background:rgba(13,17,23,.95);border:1px solid #30363d;border-radius:12px;padding:16px;z-index:100;backdrop-filter:blur(8px);width:280px;display:none;}
        #info-panel .ip-title{font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:8px;line-height:1.3;}
        #info-panel .ip-close{position:absolute;top:10px;right:12px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:16px;}
        #info-panel .ip-row{font-size:11px;color:#8b949e;padding:3px 0;display:flex;justify-content:space-between;}
        #info-panel .ip-val{color:#c9d1d9;}
        #info-panel .ip-budget{font-size:18px;font-weight:700;color:#3fb950;margin:8px 0 4px;}
        #info-panel .ip-details{margin-top:8px;max-height:160px;overflow-y:auto;}
        #info-panel .ip-det-item{font-size:10px;padding:3px 0;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;gap:8px;}
        #info-panel .ip-det-name{color:#8b949e;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        #info-panel .ip-det-bud{color:#58a6ff;font-weight:600;white-space:nowrap;}

        /* LOADING */
        #loading{position:fixed;inset:0;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
        .ld-spinner{width:48px;height:48px;border:3px solid #21262d;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .ld-text{color:#8b949e;font-size:14px;}

        /* HELP */
        #help{position:fixed;bottom:16px;left:16px;font-size:10px;color:#6e7681;z-index:100;line-height:1.8;}
    </style>
</head>
<body>
    <div id="loading">
        <div class="ld-spinner"></div>
        <div class="ld-text">3D 지도 로딩 중...</div>
    </div>

    <div id="canvas-container"></div>

    <div id="header">
        <div class="logo">
            <div class="logo-icon">🗺</div>
            <div>
                <div class="logo-text">2026년 정부 예산 3D 지도</div>
                <div class="logo-sub">건물 높이 ∝ 예산 규모 · 색상 = 분야</div>
            </div>
        </div>
        <div class="hstats">
            <div>
                <div class="hstat-val" id="h-budget">-</div>
                <div class="hstat-label">총 예산 (조원)</div>
            </div>
            <div>
                <div class="hstat-val" id="h-bldg">-</div>
                <div class="hstat-label">단위사업</div>
            </div>
            <div>
                <div class="hstat-val" id="h-field">16</div>
                <div class="hstat-label">분야</div>
            </div>
            <a href="index.html" class="back-btn">← 대시보드</a>
        </div>
    </div>

    <div id="legend">
        <h3>분야 범례</h3>
        <div id="legend-list"></div>
    </div>

    <div id="controls">
        <h3>표시 옵션</h3>
        <div class="ctrl-row">
            <button class="ctrl-btn active" id="btn-labels" onclick="toggleLabels()">라벨</button>
            <button class="ctrl-btn active" id="btn-rings" onclick="toggleRings()">분야 구역</button>
        </div>
        <div class="ctrl-row">
            <button class="ctrl-btn" onclick="resetCamera()">카메라 초기화</button>
        </div>
        <div class="scale-box">
            <div class="scale-title">예산 규모 스케일</div>
            <div class="scale-row">
                <div class="scale-block" style="width:8px;height:8px"></div>
                <div class="scale-label">100억원</div>
            </div>
            <div class="scale-row">
                <div class="scale-block" style="width:16px;height:16px"></div>
                <div class="scale-label">1,000억원</div>
            </div>
            <div class="scale-row">
                <div class="scale-block" style="width:28px;height:28px"></div>
                <div class="scale-label">1조원</div>
            </div>
            <div class="scale-row">
                <div class="scale-block" style="width:44px;height:44px"></div>
                <div class="scale-label">10조원</div>
            </div>
        </div>
    </div>

    <div id="tooltip"></div>

    <div id="info-panel">
        <button class="ip-close" onclick="closeInfo()">✕</button>
        <div id="ip-content"></div>
    </div>

    <div id="help">
        드래그: 회전 &nbsp;|&nbsp; 우클릭+드래그: 이동 &nbsp;|&nbsp; 스크롤: 확대/축소 &nbsp;|&nbsp; 클릭: 상세 정보
    </div>

    <script>
    // ══════════════════════════════
    // 상수
    // ══════════════════════════════
    const FIELD_COLORS = {
        '일반·지방행정':0x4f46e5,'공공질서및안전':0xdc2626,'통일·외교':0x0891b2,
        '국방':0x374151,'교육':0x2563eb,'문화및관광':0xdb2777,'환경':0x059669,
        '사회복지':0x7c3aed,'보건':0xea580c,'농림수산':0x65a30d,
        '산업·중소기업및에너지':0xd97706,'교통및물류':0x0d9488,'통신':0x9333ea,
        '국토및지역개발':0x1d4ed8,'과학기술':0x10b981,'예비비':0x6b7280
    };
    const FIELD_COLORS_HEX = {
        '일반·지방행정':'#4f46e5','공공질서및안전':'#dc2626','통일·외교':'#0891b2',
        '국방':'#374151','교육':'#2563eb','문화및관광':'#db2777','환경':'#059669',
        '사회복지':'#7c3aed','보건':'#ea580c','농림수산':'#65a30d',
        '산업·중소기업및에너지':'#d97706','교통및물류':'#0d9488','통신':'#9333ea',
        '국토및지역개발':'#1d4ed8','과학기술':'#10b981','예비비':'#6b7280'
    };

    // ══════════════════════════════
    // 상태
    // ══════════════════════════════
    let scene, camera, renderer, raycaster, mouse;
    let buildings = [], rings = [], labelSprites = [];
    let showLabels = true, showRings = true;
    let mapData = null;
    let hiddenFields = new Set();

    // Mouse control
    let isDragging = false, isRightDragging = false;
    let lastMouse = {x:0, y:0};
    let spherical = {theta: Math.PI/6, phi: Math.PI/3, radius: 1800};
    let target = {x:0, y:0, z:0};

    function fmtBudget(v) {
        if (v >= 1000000) return (v/1000000).toFixed(2)+'조원';
        if (v >= 100000) return (v/100000).toFixed(1)+'천억원';
        if (v >= 10000) return (v/100).toFixed(0)+'억원';
        if (v >= 100) return (v/100).toFixed(1)+'억원';
        return Math.round(v).toLocaleString()+'백만원';
    }

    // ══════════════════════════════
    // Three.js 초기화
    // ══════════════════════════════
    function initThree() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d1117);
        scene.fog = new THREE.Fog(0x0d1117, 1000, 3000);

        const w = window.innerWidth, h = window.innerHeight;
        camera = new THREE.PerspectiveCamera(50, w/h, 1, 5000);
        updateCamera();

        renderer = new THREE.WebGLRenderer({antialias:true});
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        const ambient = new THREE.AmbientLight(0x1e3050, 3.0);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.position.set(800, 1200, 600);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.near = 1;
        sun.shadow.camera.far = 5000;
        sun.shadow.camera.left = -2000;
        sun.shadow.camera.right = 2000;
        sun.shadow.camera.top = 2000;
        sun.shadow.camera.bottom = -2000;
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0x4080ff, 0.8);
        fill.position.set(-500, 500, -500);
        scene.add(fill);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(8000, 8000);
        const groundMat = new THREE.MeshLambertMaterial({color:0x161b22});
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI/2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid
        const grid = new THREE.GridHelper(6000, 60, 0x21262d, 0x21262d);
        grid.position.y = 0.5;
        scene.add(grid);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        setupControls();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    function updateCamera() {
        const {theta, phi, radius} = spherical;
        camera.position.set(
            target.x + radius * Math.sin(phi) * Math.sin(theta),
            target.y + radius * Math.cos(phi),
            target.z + radius * Math.sin(phi) * Math.cos(theta)
        );
        camera.lookAt(target.x, target.y, target.z);
    }

    // ══════════════════════════════
    // 컨트롤
    // ══════════════════════════════
    function setupControls() {
        const el = renderer.domElement;
        el.addEventListener('mousedown', e => {
            if (e.button === 2) isRightDragging = true;
            else isDragging = true;
            lastMouse = {x: e.clientX, y: e.clientY};
        });
        el.addEventListener('mousemove', e => {
            const dx = e.clientX - lastMouse.x, dy = e.clientY - lastMouse.y;
            if (isDragging) {
                spherical.theta -= dx * 0.005;
                spherical.phi = Math.max(0.1, Math.min(Math.PI/2 - 0.05, spherical.phi + dy * 0.005));
                updateCamera();
            } else if (isRightDragging) {
                const s = spherical.radius / 1000;
                target.x -= dx * s;
                target.z -= dy * s;
                updateCamera();
            }
            lastMouse = {x: e.clientX, y: e.clientY};
            updateTooltip(e);
        });
        window.addEventListener('mouseup', () => { isDragging = false; isRightDragging = false; });
        el.addEventListener('wheel', e => {
            spherical.radius = Math.max(100, Math.min(3000, spherical.radius + e.deltaY * 0.8));
            updateCamera();
        });
        el.addEventListener('click', e => handleClick(e));
        el.addEventListener('contextmenu', e => e.preventDefault());

        // Touch
        let lastTouches = [];
        el.addEventListener('touchstart', e => { lastTouches = [...e.touches]; });
        el.addEventListener('touchmove', e => {
            e.preventDefault();
            if (e.touches.length === 1) {
                const dx = e.touches[0].clientX - lastTouches[0].clientX;
                const dy = e.touches[0].clientY - lastTouches[0].clientY;
                spherical.theta -= dx * 0.005;
                spherical.phi = Math.max(0.1, Math.min(Math.PI/2-0.05, spherical.phi + dy * 0.005));
                updateCamera();
            } else if (e.touches.length === 2) {
                const d0 = Math.hypot(lastTouches[0].clientX-lastTouches[1].clientX, lastTouches[0].clientY-lastTouches[1].clientY);
                const d1 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
                spherical.radius = Math.max(100, Math.min(3000, spherical.radius * (d0/d1)));
                updateCamera();
            }
            lastTouches = [...e.touches];
        }, {passive:false});
    }

    // ══════════════════════════════
    // 건물 생성
    // ══════════════════════════════
    function createBuildings() {
        const bldgs = mapData.buildings;
        const maxBudget = Math.max(...bldgs.map(b => b.bud));

        bldgs.forEach(b => {
            const color = FIELD_COLORS[b.field] || 0x6b7280;
            const bs = Math.max(4, Math.min(60, (b.bud / 1000) ** (1/3) * 2));
            const height = Math.max(5, Math.min(500, b.bud / 5000));

            const geo = new THREE.BoxGeometry(bs, height, bs);
            const mat = new THREE.MeshLambertMaterial({color, transparent:true, opacity:0.85});
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(b.x, height/2, b.z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = b;
            scene.add(mesh);
            buildings.push({mesh, data:b, field:b.field});

            // Top highlight
            const topGeo = new THREE.BoxGeometry(bs+0.5, 1, bs+0.5);
            const topMat = new THREE.MeshLambertMaterial({color, transparent:true, opacity:0.95});
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.set(b.x, height + 0.5, b.z);
            scene.add(top);
        });
    }

    // ══════════════════════════════
    // 분야 구역 링
    // ══════════════════════════════
    function createRings() {
        mapData.groups.forEach(g => {
            const color = FIELD_COLORS[g.name] || 0x6b7280;
            const r = g.radius + 20;

            const ringGeo = new THREE.RingGeometry(r-3, r, 64);
            const ringMat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.25, side:THREE.DoubleSide});
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = -Math.PI/2;
            ring.position.set(g.cx, 1, g.cz);
            scene.add(ring);
            rings.push(ring);

            // Label
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0,0,512,128);
            ctx.font = 'bold 32px "Noto Sans KR", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(g.name, 256, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({map:texture, transparent:true, opacity:0.9});
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.set(g.cx, 30, g.cz - r - 10);
            sprite.scale.set(200, 50, 1);
            scene.add(sprite);
            labelSprites.push(sprite);
        });
    }

    // ══════════════════════════════
    // 토글
    // ══════════════════════════════
    function toggleLabels() {
        showLabels = !showLabels;
        document.getElementById('btn-labels').classList.toggle('active', showLabels);
        labelSprites.forEach(s => s.visible = showLabels);
    }

    function toggleRings() {
        showRings = !showRings;
        document.getElementById('btn-rings').classList.toggle('active', showRings);
        rings.forEach(r => r.visible = showRings);
    }

    function resetCamera() {
        spherical = {theta: Math.PI/6, phi: Math.PI/3, radius: 1800};
        target = {x:0, y:0, z:0};
        updateCamera();
    }

    function toggleField(fieldName) {
        if (hiddenFields.has(fieldName)) hiddenFields.delete(fieldName);
        else hiddenFields.add(fieldName);
        buildings.forEach(b => {
            if (b.field === fieldName) b.mesh.visible = !hiddenFields.has(fieldName);
        });
        document.querySelectorAll('.legend-item').forEach(el => {
            if (el.dataset.field === fieldName) el.classList.toggle('hidden', hiddenFields.has(fieldName));
        });
    }

    // ══════════════════════════════
    // 인터랙션
    // ══════════════════════════════
    function getRaycastHit(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const meshes = buildings.filter(b => b.mesh.visible).map(b => b.mesh);
        const hits = raycaster.intersectObjects(meshes);
        return hits.length ? hits[0] : null;
    }

    function updateTooltip(e) {
        const hit = getRaycastHit(e);
        const tt = document.getElementById('tooltip');
        if (!hit) { tt.style.display = 'none'; return; }
        const d = hit.object.userData;
        const fc = FIELD_COLORS_HEX[d.field] || '#6b7280';
        tt.style.display = 'block';
        tt.style.left = (e.clientX + 16) + 'px';
        tt.style.top = (e.clientY - 10) + 'px';
        tt.innerHTML = `
            <div class="tt-name">${d.name}</div>
            <div class="tt-budget">${fmtBudget(d.bud)}</div>
            <div class="tt-row"><span>소관부처</span><span class="tt-val">${d.min}</span></div>
            <div class="tt-row"><span>분야</span><span class="tt-val" style="color:${fc}">${d.field}</span></div>
            <div class="tt-row"><span>세부사업</span><span class="tt-val">${d.bl.length}개</span></div>
        `;
    }

    function handleClick(e) {
        const hit = getRaycastHit(e);
        if (!hit) { closeInfo(); return; }
        const d = hit.object.userData;
        const fc = FIELD_COLORS_HEX[d.field] || '#6b7280';
        const panel = document.getElementById('info-panel');
        const detHtml = d.bl.map(b => `
            <div class="ip-det-item">
                <span class="ip-det-name">${b.name}</span>
                <span class="ip-det-bud">${fmtBudget(b.bud)}</span>
            </div>`).join('');
        document.getElementById('ip-content').innerHTML = `
            <div class="ip-title">${d.name}</div>
            <div class="ip-budget">${fmtBudget(d.bud)}</div>
            <div class="ip-row"><span>소관부처</span><span class="ip-val">${d.min}</span></div>
            <div class="ip-row"><span>분야</span><span class="ip-val" style="color:${fc}">${d.field}</span></div>
            <div class="ip-row"><span>부문</span><span class="ip-val">${d.subfield}</span></div>
            <div class="ip-row"><span>세부사업 수</span><span class="ip-val">${d.bl.length}개</span></div>
            ${d.bl.length ? `<div style="margin-top:8px;font-size:10px;color:#6e7681;margin-bottom:4px">세부사업 내역</div><div class="ip-details">${detHtml}</div>` : ''}
        `;
        panel.style.display = 'block';

        // Highlight selected
        buildings.forEach(b => {
            b.mesh.material.emissive = new THREE.Color(0x000000);
            b.mesh.material.emissiveIntensity = 0;
        });
        hit.object.material.emissive = new THREE.Color(FIELD_COLORS[d.field] || 0x6b7280);
        hit.object.material.emissiveIntensity = 0.4;
    }

    function closeInfo() {
        document.getElementById('info-panel').style.display = 'none';
        buildings.forEach(b => {
            b.mesh.material.emissive = new THREE.Color(0x000000);
            b.mesh.material.emissiveIntensity = 0;
        });
    }

    // ══════════════════════════════
    // 범례
    // ══════════════════════════════
    function buildLegend() {
        const list = document.getElementById('legend-list');
        mapData.groups.forEach(g => {
            const fc = FIELD_COLORS_HEX[g.name] || '#6b7280';
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.dataset.field = g.name;
            item.onclick = () => toggleField(g.name);
            item.innerHTML = `
                <div class="legend-dot" style="background:${fc}"></div>
                <div class="legend-name">${g.name}</div>
                <div class="legend-count">${g.count}</div>
            `;
            list.appendChild(item);
        });
    }

    // ══════════════════════════════
    // 렌더 루프
    // ══════════════════════════════
    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    // ══════════════════════════════
    // 초기화
    // ══════════════════════════════
    async function init() {
        const res = await fetch('map3d.json');
        mapData = await res.json();

        const totalBudget = mapData.buildings.reduce((s,b) => s+b.bud, 0);
        document.getElementById('h-budget').textContent = (totalBudget/1000000).toFixed(1);
        document.getElementById('h-bldg').textContent = mapData.buildings.length.toLocaleString();

        initThree();
        createBuildings();
        createRings();
        buildLegend();
        animate();

        document.getElementById('loading').style.display = 'none';
    }

    init().catch(console.error);
    </script>
</body>
</html>
