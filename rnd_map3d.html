<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026년 R&D 예산 3D 도시</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Noto Sans KR',sans-serif;background:#0d1117;color:#e6edf3;overflow:hidden;height:100vh;}
        #canvas-container{width:100vw;height:100vh;}
        canvas{display:block;}

        #header{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(13,17,23,.94);border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;backdrop-filter:blur(8px);}
        .logo{display:flex;align-items:center;gap:10px;}
        .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#7c3aed,#0891b2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
        .logo-text{font-size:14px;font-weight:700;color:#e6edf3;}
        .logo-sub{font-size:10px;color:#8b949e;margin-top:1px;}
        .hstats{display:flex;gap:22px;align-items:center;}
        .hstat{text-align:right;}
        .hstat-val{font-size:15px;font-weight:700;color:#58a6ff;}
        .hstat-label{font-size:10px;color:#8b949e;}
        .back-btn{padding:6px 14px;background:#21262d;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:12px;cursor:pointer;text-decoration:none;font-family:inherit;transition:all .2s;}
        .back-btn:hover{background:#30363d;}

        #legend{position:fixed;left:16px;top:70px;background:rgba(13,17,23,.92);border:1px solid #30363d;border-radius:12px;padding:14px 12px;z-index:100;backdrop-filter:blur(8px);max-height:calc(100vh - 86px);overflow-y:auto;width:196px;}
        #legend h3{font-size:10px;font-weight:700;color:#8b949e;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
        .legend-item{display:flex;align-items:center;gap:7px;padding:3px 0;cursor:pointer;transition:opacity .15s;}
        .legend-item:hover{opacity:.75;}
        .legend-item.hidden{opacity:.28;}
        .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
        .legend-name{font-size:11px;color:#c9d1d9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .legend-meta{font-size:10px;color:#6e7681;white-space:nowrap;}

        #controls{position:fixed;right:16px;top:70px;background:rgba(13,17,23,.92);border:1px solid #30363d;border-radius:12px;padding:14px;z-index:100;backdrop-filter:blur(8px);width:210px;}
        #controls h3{font-size:10px;font-weight:700;color:#8b949e;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
        .ctrl-row{display:flex;gap:6px;margin-bottom:7px;}
        .ctrl-btn{flex:1;padding:6px 8px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s;text-align:center;}
        .ctrl-btn:hover{background:#30363d;}
        .ctrl-btn.active{background:#7c3aed;border-color:#a855f7;color:#fff;}
        .scale-box{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:10px;margin-top:8px;}
        .scale-title{font-size:10px;color:#8b949e;margin-bottom:7px;font-weight:600;}
        .scale-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
        .scale-block{background:linear-gradient(135deg,#7c3aed,#0891b2);border-radius:2px;}
        .scale-label{font-size:10px;color:#8b949e;}

        #tooltip{position:fixed;background:rgba(13,17,23,.97);border:1px solid #30363d;border-radius:10px;padding:13px;z-index:200;pointer-events:none;display:none;max-width:260px;backdrop-filter:blur(8px);}
        .tt-name{font-size:12px;font-weight:700;color:#e6edf3;margin-bottom:5px;line-height:1.3;}
        .tt-budget{font-size:15px;font-weight:700;color:#3fb950;margin:5px 0 3px;}
        .tt-row{display:flex;justify-content:space-between;font-size:11px;color:#8b949e;padding:1px 0;}
        .tt-val{color:#58a6ff;font-weight:600;}

        #info-panel{position:fixed;right:16px;bottom:16px;background:rgba(13,17,23,.97);border:1px solid #30363d;border-radius:12px;padding:16px;z-index:100;backdrop-filter:blur(8px);width:280px;display:none;}
        .ip-close{position:absolute;top:10px;right:12px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:16px;line-height:1;}
        .ip-title{font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:6px;line-height:1.3;padding-right:20px;}
        .ip-budget{font-size:18px;font-weight:700;color:#3fb950;margin:6px 0 4px;}
        .ip-row{font-size:11px;color:#8b949e;padding:2px 0;display:flex;justify-content:space-between;}
        .ip-val{color:#c9d1d9;}

        #loading{position:fixed;inset:0;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
        .ld-spinner{width:48px;height:48px;border:3px solid #21262d;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .ld-text{color:#8b949e;font-size:14px;}
        #help{position:fixed;bottom:16px;left:16px;font-size:10px;color:#484f58;z-index:100;line-height:2;}
    </style>
</head>
<body>
    <div id="loading">
        <div class="ld-spinner"></div>
        <div class="ld-text">R&D 예산 3D 도시 구성 중...</div>
    </div>

    <div id="canvas-container"></div>

    <div id="header">
        <div class="logo">
            <div class="logo-icon">🔬</div>
            <div>
                <div class="logo-text">2026년 R&D 예산 3D 도시</div>
                <div class="logo-sub">바닥 = 분야별 구역 · 건물 = R&D 사업 · 높이·크기 = log(예산)</div>
            </div>
        </div>
        <div class="hstats">
            <div class="hstat"><div class="hstat-val" id="h-budget">-</div><div class="hstat-label">총 R&D 예산 (조원)</div></div>
            <div class="hstat"><div class="hstat-val" id="h-field">-</div><div class="hstat-label">분야</div></div>
            <div class="hstat"><div class="hstat-val" id="h-bldg">-</div><div class="hstat-label">R&D 사업</div></div>
            <div class="hstat"><div class="hstat-val" id="h-sub">-</div><div class="hstat-label">참여 부처</div></div>
        </div>
    </div>

    <div id="legend">
        <h3>분야 범례</h3>
        <div id="legend-list"></div>
    </div>

    <div id="controls">
        <h3>표시 옵션</h3>
        <div class="ctrl-row">
            <button class="ctrl-btn active" id="btn-labels" onclick="toggleLabels()">라벨</button>
            <button class="ctrl-btn active" id="btn-floors" onclick="toggleFloors()">바닥</button>
        </div>
        <div class="ctrl-row">
            <button class="ctrl-btn" onclick="resetCamera()">카메라 초기화</button>
        </div>
        <div class="scale-box">
            <div class="scale-title">건물 높이 스케일 (log)</div>
            <div class="scale-row"><div class="scale-block" style="width:6px;height:12px"></div><div class="scale-label">~100억원</div></div>
            <div class="scale-row"><div class="scale-block" style="width:6px;height:30px"></div><div class="scale-label">~1,000억원</div></div>
            <div class="scale-row"><div class="scale-block" style="width:6px;height:60px"></div><div class="scale-label">~1조원</div></div>
            <div class="scale-row"><div class="scale-block" style="width:6px;height:100px"></div><div class="scale-label">~10조원 이상</div></div>
        </div>
    </div>

    <div id="tooltip"></div>

    <div id="info-panel">
        <button class="ip-close" onclick="closeInfo()">✕</button>
        <div id="ip-content"></div>
    </div>

    <div id="help">
        드래그: 회전 &nbsp;|&nbsp; 우클릭+드래그: 이동 &nbsp;|&nbsp; 스크롤: 확대/축소 &nbsp;|&nbsp; 클릭: 상세 정보
    </div>

    <script>
    // ══════════════════════════════
    // 상수
    // ══════════════════════════════
    let GROUND_SIZE = 1400; // loadData() 후 동적으로 갱신됨

    const FIELD_COLORS_INT = {
        '과학기술':0x7c3aed,'산업·중소기업및에너지':0xd97706,
        '교통및물류':0x0d9488,'공공질서및안전':0xdc2626,
        '농림수산':0x65a30d,'일반·지방행정':0x4f46e5,'통일·외교':0x0891b2,
        '기타':0x6b7280
    };
    const FIELD_COLORS_HEX = {
        '과학기술':'#7c3aed','산업·중소기업및에너지':'#d97706',
        '교통및물류':'#0d9488','공공질서및안전':'#dc2626',
        '농림수산':'#65a30d','일반·지방행정':'#4f46e5','통일·외교':'#0891b2',
        '기타':'#6b7280'
    };

    // ══════════════════════════════
    // 상태
    // ══════════════════════════════
    let scene, camera, renderer, raycaster, mouse;
    let buildingMeshGroups = [];
    let fieldFloorMeshes = [], labelSprites = [];
    let showLabels = true, showFloors = true;
    let mapData = null, fieldLayouts = [];
    let hiddenFields = new Set();
    let isDragging = false, isRightDragging = false;
    let lastMouse = {x:0, y:0};
    let spherical = {theta: Math.PI/5, phi: Math.PI/3.2, radius: 2100};
    let target = {x:0, y:0, z:0};

    // ══════════════════════════════
    // 유틸
    // ══════════════════════════════
    function fmtBudget(bud) {
        // bud: 천원 단위
        const eok = bud / 100000;
        if (eok >= 10000) return (eok/10000).toFixed(1) + '조원';
        if (eok >= 1) return eok.toFixed(0) + '억원';
        return (bud/1000).toFixed(0) + '백만원';
    }

    function calcHeight(bud) {
        // bud: 천원 단위. 1억원 = 100,000천원
        if (!bud || bud <= 0) return 8;
        const val = bud / 100000; // 억원 단위로 변환
        return Math.max(8, Math.min(600, Math.log10(val + 1) * 120));
    }

    // ══════════════════════════════
    // Squarify 알고리즘 (x,y,w,h 방식)
    // ══════════════════════════════
    function squarify(items, x, y, w, h) {
        if (!items.length) return [];
        if (items.length === 1) return [{...items[0], x, y, w, h}];
        const shortSide = Math.min(w, h);
        const horizontal = w >= h;
        let rowItems = [], best = Infinity;
        for (let i = 0; i < items.length; i++) {
            rowItems.push(items[i]);
            const rowArea = rowItems.reduce((s,r) => s+r.area, 0);
            const rowLen = rowArea / shortSide;
            const worst = Math.max(...rowItems.map(r => {
                const rw = horizontal ? rowLen : r.area/rowLen;
                const rh = horizontal ? r.area/rowLen : rowLen;
                return Math.max(rw/rh, rh/rw);
            }));
            if (worst > best) {
                rowItems.pop();
                break;
            }
            best = worst;
        }
        const rowArea = rowItems.reduce((s,r) => s+r.area, 0);
        const rowLen = rowArea / shortSide;
        let pos = horizontal ? x : y;
        const results = [];
        rowItems.forEach(r => {
            const len = r.area / rowLen;
            if (horizontal) results.push({...r, x:pos, y, w:len, h:rowLen});
            else results.push({...r, x, y:pos, w:rowLen, h:len});
            pos += len;
        });
        const remaining = items.slice(rowItems.length);
        if (remaining.length) {
            const nx = horizontal ? x : x + rowLen;
            const ny = horizontal ? y + rowLen : y;
            const nw = horizontal ? w : w - rowLen;
            const nh = horizontal ? h - rowLen : h;
            results.push(...squarify(remaining, nx, ny, nw, nh));
        }
        return results;
    }

    // ══════════════════════════════
    // Three.js 초기화
    // ══════════════════════════════
    function initScene() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d1117);
        scene.fog = new THREE.Fog(0x0d1117, GROUND_SIZE * 1.4, GROUND_SIZE * 3.2);

        const w = window.innerWidth, h = window.innerHeight;
        camera = new THREE.PerspectiveCamera(50, w / h, 1, GROUND_SIZE * 5);
        updateCamera();

        renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 조명
        scene.add(new THREE.AmbientLight(0x1e3050, 3.2));
        const sun = new THREE.DirectionalLight(0xffffff, 2.8);
        sun.position.set(1000, 2000, 800);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = sun.shadow.camera.bottom = -GROUND_SIZE * 1.2;
        sun.shadow.camera.right = sun.shadow.camera.top = GROUND_SIZE * 1.2;
        sun.shadow.camera.near = 1;
        sun.shadow.camera.far = GROUND_SIZE * 4;
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0x4080ff, 1.0);
        fill.position.set(-600, 600, -600);
        scene.add(fill);

        // 바닥
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(12000, 12000),
            new THREE.MeshLambertMaterial({color: 0x0a0e14})
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();
        setupControls();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    function updateCamera() {
        const {theta, phi, radius} = spherical;
        camera.position.set(
            target.x + radius * Math.sin(phi) * Math.sin(theta),
            target.y + radius * Math.cos(phi),
            target.z + radius * Math.sin(phi) * Math.cos(theta)
        );
        camera.lookAt(target.x, target.y, target.z);
    }

    // ══════════════════════════════
    // 컨트롤
    // ══════════════════════════════
    function setupControls() {
        const el = renderer.domElement;
        el.addEventListener('mousedown', e => {
            if (e.button === 2) isRightDragging = true; else isDragging = true;
            lastMouse = {x: e.clientX, y: e.clientY};
        });
        el.addEventListener('mousemove', e => {
            const dx = e.clientX - lastMouse.x, dy = e.clientY - lastMouse.y;
            if (isDragging) {
                spherical.theta -= dx * 0.005;
                spherical.phi = Math.max(0.06, Math.min(Math.PI / 2 - 0.02, spherical.phi + dy * 0.005));
                updateCamera();
            } else if (isRightDragging) {
                const s = spherical.radius / 1000;
                target.x -= dx * s; target.z -= dy * s;
                updateCamera();
            }
            lastMouse = {x: e.clientX, y: e.clientY};
            updateTooltip(e);
        });
        window.addEventListener('mouseup', () => { isDragging = false; isRightDragging = false; });
        el.addEventListener('wheel', e => {
            spherical.radius = Math.max(80, Math.min(6000, spherical.radius + e.deltaY * 1.0));
            updateCamera();
        }, {passive: true});
        el.addEventListener('click', e => handleClick(e));
        el.addEventListener('contextmenu', e => e.preventDefault());

        let lastTouches = [];
        el.addEventListener('touchstart', e => { lastTouches = [...e.touches]; });
        el.addEventListener('touchmove', e => {
            e.preventDefault();
            if (e.touches.length === 1) {
                spherical.theta -= (e.touches[0].clientX - lastTouches[0].clientX) * 0.005;
                spherical.phi = Math.max(0.06, Math.min(Math.PI / 2 - 0.02,
                    spherical.phi + (e.touches[0].clientY - lastTouches[0].clientY) * 0.005));
                updateCamera();
            } else if (e.touches.length === 2) {
                const d0 = Math.hypot(lastTouches[0].clientX - lastTouches[1].clientX, lastTouches[0].clientY - lastTouches[1].clientY);
                const d1 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                spherical.radius = Math.max(80, Math.min(6000, spherical.radius * (d0 / d1)));
                updateCamera();
            }
            lastTouches = [...e.touches];
        }, {passive: false});
    }

    // ══════════════════════════════
    // 분야 트리맵 바닥 생성
    // ══════════════════════════════
    function fmtBudgetLabel(fieldName) {
        const total = mapData.buildings.filter(b => b.field === fieldName).reduce((s,b) => s+b.bud, 0);
        const eok = total / 100000;
        if (eok >= 10000) return (eok/10000).toFixed(1) + '조원';
        return eok.toFixed(0) + '억원';
    }

    function makeLabel(text, subText, color, w, h) {
        const cw = 512, ch = 160;
        const canvas = document.createElement('canvas');
        canvas.width = cw; canvas.height = ch;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, cw, ch);
        ctx.fillStyle = 'rgba(10,14,20,0.72)';
        ctx.fillRect(16, 12, cw - 32, ch - 24);
        ctx.textAlign = 'center';
        ctx.shadowColor = 'rgba(0,0,0,0.95)';
        ctx.shadowBlur = 8;
        ctx.font = 'bold 52px "Noto Sans KR", sans-serif';
        ctx.fillStyle = color;
        ctx.textBaseline = 'middle';
        ctx.fillText(text, cw / 2, ch / 2 - 18);
        if (subText) {
            ctx.font = 'bold 24px "Noto Sans KR", sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.fillText(subText, cw / 2, ch / 2 + 38);
        }
        return canvas;
    }

    function createFieldFloors() {
        fieldLayouts.forEach(f => {
            const colorInt = FIELD_COLORS_INT[f.name] || 0x6b7280;
            const colorHex = FIELD_COLORS_HEX[f.name] || '#6b7280';
            const fw = f.rx1 - f.rx0, fh = f.rz1 - f.rz0;
            const cx = (f.rx0 + f.rx1) / 2, cz = (f.rz0 + f.rz1) / 2;

            // 바닥 색상 면
            const floorMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(fw - 2, fh - 2),
                new THREE.MeshLambertMaterial({color: colorInt, transparent: true, opacity: 0.14, side: THREE.DoubleSide})
            );
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.position.set(cx, 0.5, cz);
            scene.add(floorMesh);
            fieldFloorMeshes.push(floorMesh);

            // 경계 테두리 (LineLoop)
            const borderPts = [
                new THREE.Vector3(f.rx0 + 1, 1.8, f.rz0 + 1),
                new THREE.Vector3(f.rx1 - 1, 1.8, f.rz0 + 1),
                new THREE.Vector3(f.rx1 - 1, 1.8, f.rz1 - 1),
                new THREE.Vector3(f.rx0 + 1, 1.8, f.rz1 - 1),
            ];
            const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPts);
            const border = new THREE.LineLoop(borderGeo, new THREE.LineBasicMaterial({color: colorInt, transparent: true, opacity: 0.6}));
            scene.add(border);
            fieldFloorMeshes.push(border);

            // 분야명 라벨 스프라이트
            const labelCanvas = makeLabel(f.name, fmtBudgetLabel(f.name), colorHex, fw, fh);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
                map: new THREE.CanvasTexture(labelCanvas),
                transparent: true, opacity: 0.92
            }));
            const labelW = Math.max(180, Math.min(380, fw * 0.7));
            sprite.position.set(cx, 300, cz);
            sprite.scale.set(labelW, labelW * 160 / 512, 1);
            scene.add(sprite);
            labelSprites.push(sprite);
        });
    }

    // ══════════════════════════════
    // R&D 사업 건물 (단일 박스)
    // ══════════════════════════════
    function createBuildings() {
        mapData.buildings.forEach(b => {
            if (b.x == null) return;
            const totalHeight = calcHeight(b.bud);
            const colorInt = FIELD_COLORS_INT[b.field] || 0x6b7280;
            const sw = b.sw || 30, sh = b.sh || 30;

            const geo = new THREE.BoxGeometry(sw, totalHeight, sh);
            const mat = new THREE.MeshLambertMaterial({ color: colorInt });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(b.x, totalHeight/2, b.z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { type:'building', data: b };
            scene.add(mesh);
            buildingMeshGroups.push({ meshes:[mesh], data:b });

            // 엣지
            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.12}));
            line.position.copy(mesh.position);
            scene.add(line);
        });
    }

    // ══════════════════════════════
    // 토글
    // ══════════════════════════════
    function toggleLabels() {
        showLabels = !showLabels;
        document.getElementById('btn-labels').classList.toggle('active', showLabels);
        labelSprites.forEach(s => s.visible = showLabels);
    }
    function toggleFloors() {
        showFloors = !showFloors;
        document.getElementById('btn-floors').classList.toggle('active', showFloors);
        fieldFloorMeshes.forEach(m => m.visible = showFloors);
    }
    function resetCamera() {
        spherical = {theta: Math.PI / 5, phi: Math.PI / 3.2, radius: GROUND_SIZE * 1.5};
        target = {x: 0, y: 0, z: 0};
        updateCamera();
    }
    function toggleField(fieldName) {
        if (hiddenFields.has(fieldName)) hiddenFields.delete(fieldName);
        else hiddenFields.add(fieldName);
        const hidden = hiddenFields.has(fieldName);
        buildingMeshGroups.forEach(g => {
            if (g.data.field === fieldName) g.meshes.forEach(m => m.visible = !hidden);
        });
        document.querySelectorAll('.legend-item').forEach(el => {
            if (el.dataset.field === fieldName) el.classList.toggle('hidden', hidden);
        });
    }

    // ══════════════════════════════
    // 레이캐스트 / 툴팁 / 클릭
    // ══════════════════════════════
    function getRaycastHit(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const allMeshes = [];
        buildingMeshGroups.forEach(g => {
            if (!hiddenFields.has(g.data.field))
                g.meshes.forEach(m => { if (m.visible) allMeshes.push(m); });
        });
        const hits = raycaster.intersectObjects(allMeshes);
        return hits.length ? hits[0] : null;
    }

    function showTooltip(e, data) {
        const t = document.getElementById('tooltip');
        t.innerHTML = `
            <div class="tt-name">${data.name}</div>
            <div class="tt-budget">${fmtBudget(data.bud)}</div>
            <div class="tt-row"><span>부처</span><span class="tt-val">${data.ministry||'-'}</span></div>
            <div class="tt-row"><span>분야</span><span class="tt-val">${data.field||'-'}</span></div>
            <div class="tt-row"><span>부문</span><span class="tt-val">${data.subfield||'-'}</span></div>
        `;
        t.style.display = 'block';
        t.style.left = (e.clientX+12)+'px';
        t.style.top = (e.clientY-10)+'px';
    }

    function updateTooltip(e) {
        const hit = getRaycastHit(e);
        const tt = document.getElementById('tooltip');
        if (!hit) { tt.style.display = 'none'; return; }
        const data = hit.object.userData.data;
        if (!data) { tt.style.display = 'none'; return; }
        showTooltip(e, data);
    }

    function handleClick(e) {
        const hit = getRaycastHit(e);
        if (!hit) { closeInfo(); return; }
        const data = hit.object.userData.data;
        if (!data) return;
        const fc = FIELD_COLORS_HEX[data.field] || '#6b7280';
        document.getElementById('ip-content').innerHTML = `
            <div class="ip-title">${data.name}</div>
            <div class="ip-budget">${fmtBudget(data.bud)}</div>
            <div class="ip-row"><span>부처</span><span class="ip-val">${data.ministry||'-'}</span></div>
            <div class="ip-row"><span>분야</span><span class="ip-val" style="color:${fc}">${data.field||'-'}</span></div>
            <div class="ip-row"><span>부문</span><span class="ip-val">${data.subfield||'-'}</span></div>
            <div class="ip-row"><span>프로그램</span><span class="ip-val">${data.program||'-'}</span></div>
        `;
        document.getElementById('info-panel').style.display = 'block';

        // 선택 강조
        buildingMeshGroups.forEach(g => g.meshes.forEach(m => {
            if (m.material && m.material.emissive) { m.material.emissive.set(0x000000); m.material.emissiveIntensity = 0; }
        }));
        const grp = buildingMeshGroups.find(g => g.data === data);
        if (grp) grp.meshes.forEach(m => {
            if (m.material && m.material.emissive) { m.material.emissive.set(0xffffff); m.material.emissiveIntensity = 0.28; }
        });
    }

    function closeInfo() {
        document.getElementById('info-panel').style.display = 'none';
        buildingMeshGroups.forEach(g => g.meshes.forEach(m => {
            if (m.material && m.material.emissive) { m.material.emissive.set(0x000000); m.material.emissiveIntensity = 0; }
        }));
    }

    // ══════════════════════════════
    // 범례
    // ══════════════════════════════
    function buildLegend() {
        const fieldCount = {};
        mapData.buildings.forEach(b => { fieldCount[b.field] = (fieldCount[b.field] || 0) + 1; });
        const sorted = [...fieldLayouts].sort((a, b) => b.budget - a.budget);
        const list = document.getElementById('legend-list');
        sorted.forEach(f => {
            const fc = FIELD_COLORS_HEX[f.name] || '#6b7280';
            const item = document.createElement('div');
            item.className = 'legend-item'; item.dataset.field = f.name;
            item.onclick = () => toggleField(f.name);
            item.innerHTML = `<div class="legend-dot" style="background:${fc}"></div>
                <div class="legend-name">${f.name}</div>
                <div class="legend-meta">${fieldCount[f.name] || 0}</div>`;
            list.appendChild(item);
        });
    }

    // ══════════════════════════════
    // 렌더 루프
    // ══════════════════════════════
    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    // ══════════════════════════════
    // 데이터 로드 및 초기화
    // ══════════════════════════════
    async function loadData() {
        const res = await fetch('rnd_budget.json?v=' + Date.now());
        const items = await res.json();

        // 1단계: 각 항목의 bs(건물 발판 크기) 먼저 계산
        items.forEach(item => {
            item._bs = Math.max(6, Math.min(70, Math.log10(item.budget / 10000 + 1) * 14));
        });

        // 2단계: 분야별 집계 (bs² 합계도 포함)
        const fieldMap = {};
        items.forEach(item => {
            const f = item.field || '기타';
            if (!fieldMap[f]) fieldMap[f] = { name: f, budget: 0, items: [], bsArea: 0 };
            fieldMap[f].budget += item.budget;
            fieldMap[f].items.push(item);
            fieldMap[f].bsArea += item._bs * item._bs;
        });

        const total = items.reduce((s,d) => s+d.budget, 0);

        // 3단계: 분야별 필요 바닥 면적 = bs²의 합 × 여유 계수 (건물이 촘촘하게 모임)
        const FLOOR_PADDING = 2.2; // 바닥 여유 (통로 + 여백)
        const fieldList = Object.values(fieldMap).sort((a,b) => b.budget - a.budget);
        const totalBsArea = fieldList.reduce((s,f) => s + f.bsArea, 0);
        const GS = Math.round(Math.sqrt(totalBsArea * FLOOR_PADDING) * 1.05); // 동적 도시 크기
        GROUND_SIZE = GS; // 전역 업데이트 (카메라/fog에 반영)
        spherical.radius = GS * 1.5; // 초기 카메라 거리도 맞게 조정

        // 4단계: 분야 squarify - 예산 비율 대신 실제 필요 면적 기반
        const fieldItems = fieldList.map(f => ({ ...f, area: f.bsArea * FLOOR_PADDING }));
        const fieldRects = squarify(fieldItems, -GS/2, -GS/2, GS, GS);

        // fieldLayouts 생성 (rx0/rz0/rx1/rz1 형식)
        fieldLayouts = fieldRects.map(fr => ({
            name: fr.name,
            budget: fr.budget,
            rx0: fr.x, rz0: fr.y, rx1: fr.x+fr.w, rz1: fr.y+fr.h
        }));

        // 5단계: 건물 배치 - bs² 비율로 squarify → 빈 공간 최소화
        const buildings = [];
        fieldRects.forEach(fr => {
            const fitems = fr.items.sort((a,b) => b._bs - a._bs);
            const ftotalBs = fitems.reduce((s,d) => s + d._bs * d._bs, 0);
            if (!ftotalBs) return;
            const bItems = fitems.map(d => ({ ...d, area: (d._bs * d._bs / ftotalBs) * fr.w * fr.h }));
            const bRects = squarify(bItems, fr.x, fr.y, fr.w, fr.h);
            bRects.forEach(br => {
                const bs = br._bs;
                buildings.push({
                    id: br.id,
                    name: br.name,
                    ministry: br.ministry,
                    field: br.field,
                    subfield: br.subfield,
                    program: br.program,
                    bud: br.budget,
                    bl: [],
                    x: (br.x + br.w/2),
                    z: (br.y + br.h/2),
                    sw: bs,
                    sh: bs
                });
            });
        });

        mapData = { buildings };

        // 헤더 통계
        document.getElementById('h-budget').textContent = (total/1000000000).toFixed(2);
        document.getElementById('h-field').textContent = fieldList.length;
        document.getElementById('h-bldg').textContent = items.length.toLocaleString();
        document.getElementById('h-sub').textContent = Object.keys(Object.fromEntries(items.map(d=>[d.ministry,1]))).length;

        initScene();
        createFieldFloors();
        createBuildings();
        buildLegend();
        animate();
        document.getElementById('loading').style.display = 'none';
    }

    loadData().catch(console.error);
    </script>
